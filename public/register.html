<!doctype html>
<html>
    
  <head>
    <title>Register-Form</title>
  </head>

  <body>
    <h2>REGISTER</h2>

    <form action="/register" method="POST">
      <p>Email:</p>
      <input type="email" name="email" required />

      <p>Password:</p>
      <input type="password" name="password" required />

      <br /><br />
      <button type="submit">LOGIN</button>
    </form>
  </body>

</html>
